// ====== LINE CHART ======
function LineChart({data,width=220,height=70,T}) {
  if(!data||data.length<2) return null;
  const min=Math.min(...data)-1, max=Math.max(...data)+1;
  const pts=data.map((v,i)=>{const x=(i/(data.length-1))*width;const y=height-((v-min)/(max-min))*height;return[x,y];});
  const path=pts.map(([x,y],i)=>`${i===0?"M":"L"}${x},${y}`).join(" ");
  const area=`${path} L${width},${height} L0,${height} Z`;
  const col=T.sub;
  return (
    <svg width={width} height={height} style={{overflow:"visible"}}>
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity="0.2"/><stop offset="100%" stopColor={col} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#ag)"/>
      <path d={path} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={i===pts.length-1?5:3} fill={i===pts.length-1?T.accent:col} stroke={T.bg} strokeWidth="1.5"/>)}
    </svg>
  );
}

// ====== RADAR ======
function Radar({data,size=140,T}) {
  const labels=["音程","安定感","表現力","リズム","ロング"];
  const vals=data||[82,78,75,80,70];
  const cx=size/2,cy=size/2,r=size*0.33;
  const ang=i=>Math.PI*2*i/labels.length-Math.PI/2;
  const pt=(i,v)=>{const a=ang(i),ratio=v/100;return[cx+r*ratio*Math.cos(a),cy+r*ratio*Math.sin(a)];};
  const grid=ratio=>labels.map((_,i)=>{const[x,y]=pt(i,ratio*100);return`${x},${y}`;}).join(" ");
  const dpts=vals.map((v,i)=>pt(i,v)).map(([x,y])=>`${x},${y}`).join(" ");
  return (
    <svg width={size} height={size}>
      {[0.33,0.66,1].map((r,ri)=><polygon key={ri} points={grid(r)} fill="none" stroke={T.border} strokeWidth="0.8"/>)}
      {labels.map((_,i)=>{const[x2,y2]=pt(i,100);return<line key={i} x1={cx} y1={cy} x2={x2} y2={y2} stroke={T.border} strokeWidth="0.8"/>;} )}
      <polygon points={dpts} fill={T.subDim} stroke={T.sub} strokeWidth="1.5"/>
      {vals.map((v,i)=>{const[x,y]=pt(i,v);return<circle key={i} cx={x} cy={y} r="2.5" fill={T.accent}/>;} )}
      {labels.map((l,i)=>{const[x,y]=pt(i,118);return<text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill={T.textDim} fontSize="9">{l}</text>;})}
    </svg>
  );
}

function Calendar({data,setPage,setDetailDate,T}) {
  const [yr,setYr]=useState(2026);

  const dim=new Date(yr,mo,0).getDate();
  const fd=new Date(yr,mo-1,1).getDay();
  const moStr=`${yr}-${String(mo).padStart(2,"0")}`;
  const moSessions=data.sessions.filter(s=>s.date.startsWith(moStr));
  const getS=d=>data.sessions.find(s=>s.date===`${yr}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")}`);

  return (
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>

        <div style={{fontSize:16,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>📅 {yr}年{mo}月</div>

      </div>
      <Card T={T} style={{marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",textAlign:"center",marginBottom:10}}>
          {["日","月","火","水","木","金","土"].map((w,i)=><span key={i} style={{fontSize:10,color:i===0?"#E45B5B":i===6?"#4A90D9":T.textDim,paddingBottom:4}}>{w}</span>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {Array.from({length:fd}).map((_,i)=><div key={`p${i}`}/>)}

            const s=getS(day);
            const ds=`${yr}-${String(mo).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const isToday=ds==="2026-06-12";

                {s&&<div style={{width:5,height:5,borderRadius:"50%",background:hasBest?T.accent:T.sub,marginTop:1}}/>}
              </div>
            );
          })}
        </div>
      </Card>

      {moSessions.length===0&&<div style={{textAlign:"center",color:T.textDim,padding:32}}>この月の記録はありません</div>}

          <div><div style={{fontSize:12,color:T.text}}>{inst.date.replace(/-/g,".")}</div><div style={{fontSize:10,color:T.textDim}}>{inst.machine}</div></div>
          <div style={{fontSize:14,fontWeight:800,color:inst.isBest?T.accent:T.sub}}>{inst.score.toFixed(2)}点{inst.isBest&&" ✨"}</div>
        </div>
      ))}</Card>}
      {tab==="memo"&&<div>{instances.filter(i=>i.memo).map((inst,i)=>(
        <Card key={i} T={T} style={{marginBottom:8}}><div style={{fontSize:10,color:T.accent,marginBottom:4}}>{inst.date.replace(/-/g,".")}</div><div style={{fontSize:12,color:T.text,lineHeight:1.7}}>{inst.memo}</div></Card>
      ))}{instances.every(i=>!i.memo)&&<div style={{color:T.textDim,textAlign:"center",padding:32}}>メモなし</div>}</div>}
    </div>
  );
}

// ====== HISTORY ======
function History({data,setPage,setDetailDate,setDetailSong,T}) {
  const grouped={};
  data.sessions.forEach(s=>{const m=s.date.slice(0,7);if(!grouped[m])grouped[m]=[];grouped[m].push(s);});
  const mLabels={"2026-06":"6月","2026-05":"5月","2026-04":"4月","2026-03":"3月"};
  return (
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{padding:"18px 0 14px",fontSize:17,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>📜 歌唱履歴</div>
      {Object.entries(grouped).sort(([a],[b])=>b.localeCompare(a)).map(([month,sessions])=>(
        <div key={month} style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{background:T.accent,borderRadius:"4px 12px 12px 4px",padding:"4px 14px"}}>
              <span style={{fontSize:12,fontWeight:800,color:"#FFF"}}>{mLabels[month]||month}</span>
            </div>
            <div style={{flex:1,height:1,background:T.border}}/>
          </div>
          {sessions.sort((a,b)=>b.date.localeCompare(a.date)).map((session,si)=>(
            <Card key={si} T={T} style={{marginBottom:8}}>
              <div onClick={()=>{setDetailDate(session.date);setPage("day");}} style={{display:"flex",justifyContent:"space-between",marginBottom:8,cursor:"pointer",paddingBottom:6,borderBottom:`1px solid ${T.border}`}}>
                <span style={{fontSize:12,fontWeight:700,color:T.accent}}>{session.date.replace(/-/g,".")}</span>
                <span style={{fontSize:11,color:T.textDim}}>詳細 ›</span>
              </div>
              {session.songs.map((song,i)=>(
                <div key={i} onClick={()=>{setDetailSong(song.title);setPage("songdetail");}} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:i>0?`1px solid ${T.border}`:"none",cursor:"pointer"}}>
                  <div><span style={{fontSize:12,color:T.text}}>{song.title}</span><span style={{fontSize:10,color:T.textDim,marginLeft:8}}>{song.artist}</span></div>
                  <span style={{fontSize:13,fontWeight:700,color:song.isBest?T.accent:T.sub}}>{song.score.toFixed(2)}点</span>
                </div>
              ))}
            </Card>
          ))}
        </div>
      ))}
    </div>
  );
}

// ====== ANALYSIS ======
function Analysis({data,T}) {
  const [tab,setTab]=useState("total");
  const all=data.sessions.flatMap(s=>s.songs);
  const best=all.length?Math.max(...all.map(s=>s.score)):0;
  const avg=all.length?all.reduce((a,b)=>a+b.score,0)/all.length:0;
  const songBests={};
  all.forEach(s=>{if(!songBests[s.title]||songBests[s.title]<s.score)songBests[s.title]=s.score;});
  const ranking=Object.entries(songBests).sort(([,a],[,b])=>b-a);
  const radarVals=[85,80,75,88,72];
  const radarComments=["高音域が安定しています","声の揺れが少なく安定感◎","感情表現が豊かです","リズム感が向上中","ロングトーンを練習中"];
  return (
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{padding:"18px 0 14px",fontSize:17,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>📊 分析ノート</div>
      <div style={{display:"flex",gap:0,marginBottom:14,background:T.bgMid,borderRadius:12,padding:4}}>
        {[["total","総合"],["song","曲別"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"8px 0",background:tab===id?T.sub:"none",border:"none",borderRadius:8,color:tab===id?"#FFF":T.textDim,cursor:"pointer",fontSize:12,fontWeight:tab===id?700:400}}>{label}</button>
        ))}
      </div>
      {tab==="total"&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          <Card T={T} style={{textAlign:"center"}}><div style={{fontSize:9,color:T.textDim}}>自己ベスト</div><div style={{fontSize:26,fontWeight:900,color:T.accent}}>{best.toFixed(2)}</div></Card>
          <Card T={T} style={{textAlign:"center"}}><div style={{fontSize:9,color:T.textDim}}>総合平均</div><div style={{fontSize:26,fontWeight:900,color:T.text}}>{avg.toFixed(2)}</div></Card>
        </div>
        <Card T={T} style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:T.accent,marginBottom:10}}>▼ スコア推移</div>
          <div style={{display:"flex",justifyContent:"center"}}><LineChart data={[87.32,88.45,89.33,90.11,91.24,92.11,93.67]} width={280} height={80} T={T}/></div>
        </Card>
        <Card T={T}>
          <div style={{fontSize:12,fontWeight:700,color:T.accent,marginBottom:10}}>▼ 得意・苦手バランス</div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <Radar data={radarVals} size={145} T={T}/>
            <div style={{flex:1}}>{["音程","安定感","表現力","リズム","ロング"].map((l,i)=>(
              <div key={i} style={{marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:9,color:T.textDim}}>{l}</span><span style={{fontSize:9,color:T.text}}>{radarVals[i]}</span></div>
                <div style={{height:3,borderRadius:2,background:T.border}}><div style={{height:"100%",borderRadius:2,background:T.sub,width:`${radarVals[i]}%`}}/></div>
                <div style={{fontSize:8,color:T.textDim,marginTop:2}}>{radarComments[i]}</div>
              </div>
            ))}</div>
          </div>
        </Card>
      </>}
      {tab==="song"&&<Card T={T}>
        <div style={{fontSize:12,fontWeight:700,color:T.accent,marginBottom:10}}>🏆 曲別ランキング</div>
        {ranking.map(([title,score],i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<ranking.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{width:22,textAlign:"center",fontSize:13,fontWeight:700,color:i<3?T.accent:T.textDim}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:T.text}}>{title}</div>
              <div style={{height:3,borderRadius:2,background:T.border,marginTop:4}}><div style={{height:"100%",borderRadius:2,background:i===0?T.accent:T.sub,width:`${((score-85)/15)*100}%`}}/></div>
            </div>
            <div style={{fontSize:13,fontWeight:800,color:i===0?T.accent:T.text}}>{score.toFixed(2)}</div>
          </div>
        ))}
      </Card>}
    </div>
  );
}

// ====== MYPAGE ======
function MyPage({data,setPage,currentThemeId,setTheme,T}) {
  const all=data.sessions.flatMap(s=>s.songs);
  const best=all.length?Math.max(...all.map(s=>s.score)):0;
  const avg=all.length?all.reduce((a,b)=>a+b.score,0)/all.length:0;
  const days=new Set(data.sessions.map(s=>s.date)).size;
  const favs=[...new Map(all.filter(s=>s.favorite).map(s=>[s.title,s])).values()];
  const badges=[
    {icon:"🎵",label:"初記録達成",earned:true},{icon:"✨",label:"ベスト更新",earned:true},
    {icon:"📖",label:"10曲記録",earned:true},{icon:"🔥",label:"連続7日",earned:false},
    {icon:"⭐",label:"平均90点超",earned:true},{icon:"🏆",label:"95点達成",earned:false},
  ];
  return (
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{padding:"18px 0 14px",fontSize:17,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>👤 プロフィール帳</div>
      <Card T={T} style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
        <AppIcon size={52} T={T}/>
        <div><div style={{fontSize:17,fontWeight:700,color:T.text}}>{data.user.name}</div><div style={{fontSize:11,color:T.accent}}>歌声の成長を記録中 🎵</div><div style={{fontSize:10,color:T.textDim,marginTop:4}}>{data.sessions.length}セッション · {all.length}曲</div></div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[{label:"記録曲数",val:`${all.length}曲`},{label:"平均スコア",val:`${avg.toFixed(1)}点`},{label:"自己ベスト",val:`${best.toFixed(2)}点`,color:T.accent}].map((item,i)=>(
          <Card key={i} T={T} style={{textAlign:"center",padding:"12px 8px"}}>
            <div style={{fontSize:9,color:T.textDim,marginBottom:4}}>{item.label}</div>
            <div style={{fontSize:15,fontWeight:800,color:item.color||T.text}}>{item.val}</div>
          </Card>
        ))}
      </div>

      {/* テーマ切替 */}
      <SectionLabel T={T}>THEME</SectionLabel>
      <Card T={T} style={{marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:T.accent,marginBottom:10}}>🎨 テーマ切替</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.values(THEMES).map(theme=>(
            <button key={theme.id} onClick={()=>setTheme(theme.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:currentThemeId===theme.id?T.subDim:"none",border:`1.5px solid ${currentThemeId===theme.id?T.sub:T.border}`,borderRadius:10,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:18}}>{theme.label.split(" ")[0]}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:T.text}}>{theme.label.split(" ").slice(1).join(" ")}</div>
                <div style={{fontSize:10,color:T.textDim}}>{theme.desc}</div>
              </div>
              {currentThemeId===theme.id&&<span style={{fontSize:16,color:T.accent}}>✓</span>}
            </button>
          ))}
        </div>
      </Card>

      <Card T={T} style={{marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:T.accent,marginBottom:10}}>🎖️ 実績バッジ</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {badges.map((b,i)=>(
            <div key={i} style={{textAlign:"center",padding:"8px 4px",background:b.earned?T.subDim:T.border,borderRadius:10,border:`1px solid ${b.earned?T.sub:T.border}`,opacity:b.earned?1:0.4}}>
              <div style={{fontSize:20}}>{b.icon}</div>
              <div style={{fontSize:8,color:b.earned?T.accent:T.textDim,marginTop:3,lineHeight:1.3}}>{b.label}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card T={T}>
        <div style={{fontSize:12,fontWeight:700,color:T.accent,marginBottom:10}}>⭐ お気に入り曲</div>
        {favs.slice(0,5).map((song,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<Math.min(favs.length,5)-1?`1px solid ${T.border}`:"none"}}>
            <div><div style={{fontSize:12,color:T.text}}>{song.title}</div><div style={{fontSize:10,color:T.textDim}}>{song.artist}</div></div>
            <span style={{color:T.accent,fontSize:16}}>★</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ====== RECORD ======
function Record({data,setData,setPage,T}) {
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [memo,setMemo]=useState("");
  const [songs,setSongs]=useState([{title:"",artist:"",score:"",machine:"JOYSOUND MAX GO"}]);
  const [pasteText,setPasteText]=useState("");
  const [pasteMsg,setPasteMsg]=useState("");

  const addSong=()=>setSongs(p=>[...p,{title:"",artist:"",score:"",machine:"JOYSOUND MAX GO"}]);
  const upd=(i,k,v)=>setSongs(p=>p.map((s,idx)=>idx===i?{...s,[k]:v}:s));

  const save=()=>{
    const valid=songs.filter(s=>s.title&&s.score);
    if(!valid.length)return;
    const ns={id:`s${Date.now()}`,date,memo,songs:valid.map((s,i)=>({id:`sg${Date.now()}${i}`,title:s.title,artist:s.artist,score:parseFloat(s.score),machine:s.machine,isBest:false,favorite:false,tags:[]}))};
    const nd={...data,sessions:[ns,...data.sessions]};
    setData(nd);saveData(nd);setPage("home");
  };

  // コピペ形式: 曲名|アーティスト|スコア|機種 を1行ずつ
  const parsePaste=()=>{
    const lines=pasteText.trim().split("\n").filter(l=>l.trim());
    const parsed=lines.map(line=>{
      const parts=line.split("|");
      return {
        title:parts[0]?.trim()||"",
        artist:parts[1]?.trim()||"",
        score:parts[2]?.trim()||"",
        machine:parts[3]?.trim()||"JOYSOUND MAX GO"
      };
    }).filter(s=>s.title&&s.score);
    if(parsed.length>0){
      setSongs(parsed);
      setPasteMsg(`✅ ${parsed.length}曲を読み込みました！`);
      setPasteText("");
      setTimeout(()=>setPasteMsg(""),3000);
    } else {
      setPasteMsg("⚠️ 形式が違います。曲名|アーティスト|スコア|機種 の形で入力してください");
      setTimeout(()=>setPasteMsg(""),4000);
    }
  };

  const inp={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.text,fontSize:13,outline:"none"};

  return (
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 0 14px"}}>
        <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:T.accent,fontSize:20,cursor:"pointer"}}>‹</button>
        <div style={{fontSize:15,fontWeight:700,color:T.accent}}>📝 新しい歌唱の記録</div>
      </div>

      {/* Claudeからコピペ入力 */}
      <Card T={T} style={{marginBottom:12,border:`1px solid ${T.sub}50`}}>
        <div style={{fontSize:11,fontWeight:700,color:T.sub,marginBottom:4}}>📋 Claudeからコピペで入力</div>
        <div style={{fontSize:10,color:T.textDim,marginBottom:8,lineHeight:1.6}}>
          採点画面の写真をClaudeに送って「KaraLog形式で」と頼むと👇の形式で返してくれます{"\n"}
          <span style={{color:T.accent,fontWeight:600}}>曲名|アーティスト|スコア|機種</span>
        </div>
        <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={3}
          placeholder={"残酷な天使のテーゼ|高橋洋子|93.67|JOYSOUND MAX GO\n糸|中島みゆき|92.11|DAM"}
          style={{...inp,resize:"none",fontSize:11,marginBottom:8}}/>
        <button onClick={parsePaste} style={{width:"100%",padding:"9px",background:T.sub,border:"none",borderRadius:8,color:"#FFF",fontWeight:700,fontSize:12,cursor:"pointer"}}>
          読み込む
        </button>
        {pasteMsg&&<div style={{marginTop:6,fontSize:11,color:T.accent,fontWeight:600,textAlign:"center"}}>{pasteMsg}</div>}
      </Card>

      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,color:T.textDim,marginBottom:6}}>日付</div>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp}/>
      </Card>
      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,color:T.textDim,marginBottom:6}}>メモ・感想</div>
        <textarea value={memo} onChange={e=>setMemo(e.target.value)} rows={3} placeholder="今日の歌唱の感想を書いてみよう..." style={{...inp,resize:"none"}}/>
      </Card>

      <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>🎵 歌唱曲</div>
      {songs.map((song,i)=>(
        <Card key={i} T={T} style={{marginBottom:8}}>
          <div style={{fontSize:10,color:T.accent,marginBottom:8}}>曲 {i+1}</div>
          {[{label:"曲名",key:"title",p:"残酷な天使のテーゼ"},{label:"アーティスト",key:"artist",p:"高橋洋子"},{label:"スコア",key:"score",p:"93.67",type:"number"}].map(f=>(
            <div key={f.key} style={{marginBottom:6}}>
              <div style={{fontSize:10,color:T.textDim,marginBottom:3}}>{f.label}</div>
              <input type={f.type||"text"} value={song[f.key]} onChange={e=>upd(i,f.key,e.target.value)} placeholder={f.p} style={inp}/>
            </div>
          ))}
        </Card>
      ))}
      <button onClick={addSong} style={{width:"100%",padding:10,background:"none",border:`1px dashed ${T.border}`,borderRadius:12,color:T.textDim,cursor:"pointer",marginBottom:12,fontSize:13}}>＋ 曲を追加</button>
      <button onClick={save} style={{width:"100%",padding:14,background:T.accent,border:"none",borderRadius:12,color:"#FFF",fontWeight:700,fontSize:15,cursor:"pointer"}}>手帳に書き込む ✍️</button>
    </div>
  );
}

// ====== APP ======
function App() {
  const [data,setData]=useState(()=>loadData());
  const [page,setPage]=useState("home");
  const [detailDate,setDetailDate]=useState("2026-06-12");
  const [detailSong,setDetailSong]=useState(null);
  const [themeId,setThemeId]=useState(()=>localStorage.getItem(THEME_KEY)||"note");

  const setTheme=useCallback(id=>{
    setThemeId(id);
    localStorage.setItem(THEME_KEY,id);
  },[]);

  const T=THEMES[themeId]||THEMES.note;

  return (
    <div style={{maxWidth:430,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",background:T.bg,color:T.text,fontFamily:"'Hiragino Sans','Noto Sans JP',sans-serif",position:"relative",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto"}}>
        {page==="home"&&<Home data={data} setPage={setPage} setDetailDate={setDetailDate} T={T}/>}
        {page==="calendar"&&<Calendar data={data} setPage={setPage} setDetailDate={setDetailDate} T={T}/>}
        {page==="day"&&<Day data={data} date={detailDate} setPage={setPage} setDetailSong={setDetailSong} T={T}/>}
        {page==="songdetail"&&<SongDetail data={data} songTitle={detailSong} setPage={setPage} T={T}/>}
        {page==="history"&&<History data={data} setPage={setPage} setDetailDate={setDetailDate} setDetailSong={setDetailSong} T={T}/>}
        {page==="analysis"&&<Analysis data={data} T={T}/>}
        {page==="mypage"&&<MyPage data={data} setPage={setPage} currentThemeId={themeId} setTheme={setTheme} T={T}/>}
        {page==="record"&&<Record data={data} setData={setData} setPage={setPage} T={T}/>}
      </div>
      {page!=="record"&&<Nav page={page} setPage={setPage} T={T}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
