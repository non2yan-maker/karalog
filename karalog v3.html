// ====== NOTE NAMES ======
const NOTES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function noteToMidi(n){
  if(!n)return null;
  const m=n.match(/^([A-G]#?)(\d)$/);
  if(!m)return null;
  return NOTES.indexOf(m[1])+parseInt(m[2])*12;
}
function midiToNote(m){
  if(m==null)return "";
  return NOTES[m%12]+Math.floor(m/12);
}

// ====== PARSE KARASCORE FORMAT ======
// KARASCORE|曲名|アーティスト|点数|機種|日付|最低音|最高音|音程%|ビブラート|ロングトーン|抑揚|安定性|リズム|キー|メモ
function parseKaraScore(text){
  const lines=text.trim().split("\n").filter(l=>l.trim());
  const results=[];
  for(const line of lines){
    const p=line.split("|");
    if(p[0]?.trim()==="KARASCORE"&&p.length>=5){
      results.push({
        id:`r${Date.now()}${Math.random()}`,
        title:p[1]?.trim()||"",
        artist:p[2]?.trim()||"",
        score:parseFloat(p[3])||0,
        machine:p[4]?.trim()||"JOYSOUND",
        date:p[5]?.trim()||new Date().toISOString().slice(0,10),
        lowNote:p[6]?.trim()||"",
        highNote:p[7]?.trim()||"",
        pitchRate:p[8]?parseInt(p[8]):null,
        vibrato:p[9]?parseFloat(p[9]):null,
        longTone:p[10]?parseFloat(p[10]):null,
        expression:p[11]?parseInt(p[11]):null,
        stability:p[12]?parseInt(p[12]):null,
        rhythm:p[13]?parseInt(p[13]):null,
        key:p[14]?parseInt(p[14]):0,
        memo:p[15]?.trim()||"",
        favorite:false,
      });
    } else if(p.length>=3&&!isNaN(parseFloat(p[2]))){
      // 簡易形式: 曲名|アーティスト|点数|機種
      results.push({
        id:`r${Date.now()}${Math.random()}`,
        title:p[0]?.trim()||"",artist:p[1]?.trim()||"",
        score:parseFloat(p[2])||0,machine:p[3]?.trim()||"JOYSOUND",
        date:new Date().toISOString().slice(0,10),
        lowNote:"",highNote:"",pitchRate:null,vibrato:null,longTone:null,
        expression:null,stability:null,rhythm:null,key:0,memo:"",favorite:false,
      });
    }
  }
  return results;
}

function TornPaper({children,T}){

      {children}
      <div style={{position:"absolute",bottom:-7,left:0,right:0,height:8,backgroundImage:`linear-gradient(-45deg,transparent 4px,${T.paperBg} 4px),linear-gradient(45deg,transparent 4px,${T.paperBg} 4px)`,backgroundSize:"8px 8px"}}/>
    </div>
  );
}

function LineChart({data,width=220,height=60,T}){
  if(!data||data.length<2)return null;
  const min=Math.min(...data)-1,max=Math.max(...data)+1;
  const pts=data.map((v,i)=>{const x=(i/(data.length-1))*width;const y=height-((v-min)/(max-min))*height;return[x,y];});
  const path=pts.map(([x,y],i)=>`${i===0?"M":"L"}${x},${y}`).join(" ");
  const area=`${path} L${width},${height} L0,${height} Z`;
  return(
    <svg width={width} height={height} style={{overflow:"visible"}}>
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={T.sub} stopOpacity="0.2"/><stop offset="100%" stopColor={T.sub} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#ag)"/>
      <path d={path} fill="none" stroke={T.sub} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={i===pts.length-1?5:3} fill={i===pts.length-1?T.accent:T.sub} stroke={T.bg} strokeWidth="1.5"/>)}
    </svg>
  );
}

// ====== HOME ======
function Home({data,setPage,setSelRecord,T}){
  const recs=data.records;
  const best=recs.length?Math.max(...recs.map(r=>r.score)):0;
  const avg=recs.length?recs.reduce((a,b)=>a+b.score,0)/recs.length:0;
  const thisM=recs.filter(r=>r.date.startsWith("2026-06"));
  const lastM=recs.filter(r=>r.date.startsWith("2026-05"));
  const tAvg=thisM.length?thisM.reduce((a,b)=>a+b.score,0)/thisM.length:0;
  const lAvg=lastM.length?lastM.reduce((a,b)=>a+b.score,0)/lastM.length:0;
  const diff=(tAvg-lAvg).toFixed(1);
  const recent=recs[0];
  const scores=[...recs].sort((a,b)=>a.date.localeCompare(b.date)).map(r=>r.score);
  const bestRec=recs.reduce((a,b)=>a.score>b.score?a:b,recs[0]);

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 0 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <KLIcon size={44}/>
          <div>
            <div style={{fontSize:20,fontWeight:900,color:T.accent,fontFamily:"Georgia,serif"}}>KaraLog</div>
            <div style={{fontSize:10,color:T.textDim}}>歌唱データ記録・分析</div>
          </div>
        </div>
        <button onClick={()=>setPage("record")} style={{background:T.accent,border:"none",borderRadius:20,padding:"7px 15px",color:"#FFF",fontSize:11,fontWeight:700,cursor:"pointer"}}>＋ 入力</button>
      </div>

      {recent&&(
        <TornPaper T={T}>
          <div style={{fontSize:10,color:T.paperText,opacity:0.6,marginBottom:4}}>📖 最近の記録</div>
          <div style={{fontSize:13,color:T.paperText,fontWeight:700}}>{recent.title}</div>
          <div style={{fontSize:11,color:T.paperText,opacity:0.7}}>{recent.artist} · {recent.date}</div>
          <div style={{fontSize:22,fontWeight:900,color:T.paperText,marginTop:4}}>{recent.score.toFixed(3)}<span style={{fontSize:12,opacity:0.6}}>点</span></div>
          {recent.memo&&<div style={{fontSize:11,color:T.paperText,opacity:0.7,marginTop:4,fontStyle:"italic"}}>「{recent.memo}」</div>}
        </TornPaper>
      )}

      <div style={{fontSize:10,fontWeight:700,color:T.textDim,letterSpacing:2,marginBottom:8}}>STATS</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        {[{label:"自己ベスト",val:best.toFixed(3),color:T.accent},{label:"総合平均",val:avg.toFixed(2),color:T.text},{label:"総記録数",val:`${recs.length}件`,color:T.text}].map((item,i)=>(
          <Card key={i} T={T} style={{padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:9,color:T.textDim,marginBottom:3}}>{item.label}</div>
            <div style={{fontSize:14,fontWeight:800,color:item.color}}>{item.val}</div>
          </Card>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[{label:"今月",val:`${thisM.length}件`,icon:"🎤",color:T.sub},{label:"先月比",val:`${parseFloat(diff)>=0?"+":""}${diff}点`,icon:"📈",color:parseFloat(diff)>=0?T.good:T.bad},{label:"お気に入り",val:`${recs.filter(r=>r.favorite).length}曲`,icon:"⭐",color:T.accent}].map((item,i)=>(

// ====== HISTORY ======
function History({data,setData,setPage,setSelRecord,T}){
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("date");
  const recs=[...data.records].filter(r=>
    r.title.includes(search)||r.artist.includes(search)||r.machine.includes(search)
  ).sort((a,b)=>{
    if(sort==="score")return b.score-a.score;
    if(sort==="title")return a.title.localeCompare(b.title);
    return b.date.localeCompare(a.date);
  });

  const grouped={};
  recs.forEach(r=>{const m=r.date.slice(0,7);if(!grouped[m])grouped[m]=[];grouped[m].push(r);});

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{padding:"18px 0 12px",fontSize:17,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>📝 歌唱履歴</div>

      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="曲名・アーティスト検索..."
          style={{flex:1,background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",color:T.text,fontSize:12,outline:"none"}}/>
        <select value={sort} onChange={e=>setSort(e.target.value)}
          style={{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px",color:T.text,fontSize:11,outline:"none"}}>
          <option value="date">日付順</option>
          <option value="score">スコア順</option>
          <option value="title">曲名順</option>
        </select>
      </div>

      {Object.entries(grouped).sort(([a],[b])=>b.localeCompare(a)).map(([month,rs])=>(
        <div key={month} style={{marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{background:T.accent,borderRadius:"4px 12px 12px 4px",padding:"3px 12px"}}>
              <span style={{fontSize:11,fontWeight:800,color:"#FFF"}}>{month.replace("-","年")}月</span>
            </div>
            <div style={{flex:1,height:1,background:T.border}}/>
          </div>
          {rs.map((r,i)=>(
            <Card key={i} T={T} onClick={()=>{setSelRecord(r.id);setPage("detail");}} style={{marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:600,color:T.text}}>{r.title} {r.favorite&&"★"}</div>
                <div style={{fontSize:10,color:T.textDim}}>{r.artist} · {r.machine}</div>
                {r.lowNote&&r.highNote&&<div style={{fontSize:9,color:T.sub,marginTop:2}}>音域: {r.lowNote}〜{r.highNote}{r.pitchRate!=null?` · 音程${r.pitchRate}%`:""}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                <div style={{fontSize:14,fontWeight:800,color:T.accent}}>{r.score.toFixed(3)}</div>
                <div style={{fontSize:9,color:T.textDim}}>{r.date.slice(5).replace("-","/")} ›</div>
              </div>
            </Card>
          ))}
        </div>
      ))}
      {recs.length===0&&<div style={{textAlign:"center",color:T.textDim,padding:40}}>記録がありません</div>}
    </div>
  );
}

// ====== DETAIL ======
function Detail({data,setData,recordId,setPage,T}){
  const r=data.records.find(rec=>rec.id===recordId);
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState(r||{});

  if(!r)return<div style={{color:T.textDim,padding:32,textAlign:"center"}}>データなし</div>;

  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));

  const saveEdit=()=>{
    const nd={...data,records:data.records.map(rec=>rec.id===r.id?{...rec,...form}:rec)};
    setData(nd);save(nd);setEditing(false);
  };

  const del=()=>{
    if(!confirm(`「${r.title}」を削除しますか？`))return;
    const nd={...data,records:data.records.filter(rec=>rec.id!==r.id)};
    setData(nd);save(nd);setPage("history");
  };

  const toggleFav=()=>{
    const nd={...data,records:data.records.map(rec=>rec.id===r.id?{...rec,favorite:!rec.favorite}:rec)};
    setData(nd);save(nd);
  };

  const inp={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 10px",color:T.text,fontSize:12,outline:"none",marginTop:3};

  const Field=({label,val,k,type="text"})=>(
    <div style={{marginBottom:8}}>
      <div style={{fontSize:9,color:T.textDim}}>{label}</div>
      {editing
        ?<input type={type} value={form[k]??""} onChange={e=>upd(k,type==="number"?parseFloat(e.target.value):e.target.value)} style={inp}/>
        :<div style={{fontSize:13,color:T.text,fontWeight:500,paddingTop:2}}>{val||"—"}</div>
      }
    </div>
  );

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"18px 0 12px"}}>
        <button onClick={()=>setPage("history")} style={{background:"none",border:"none",color:T.accent,fontSize:20,cursor:"pointer"}}>‹</button>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:T.accent}}>{r.title}</div>
          <div style={{fontSize:10,color:T.textDim}}>{r.artist} · {r.date}</div>
        </div>
        <button onClick={toggleFav} style={{background:"none",border:"none",fontSize:20,cursor:"pointer"}}>{r.favorite?"★":"☆"}</button>
        <button onClick={()=>setEditing(!editing)} style={{background:editing?T.sub:T.accent,border:"none",borderRadius:8,padding:"5px 10px",color:"#FFF",fontSize:11,cursor:"pointer"}}>{editing?"キャンセル":"編集"}</button>
      </div>

      {/* スコアヒーロー */}
      <Card T={T} style={{marginBottom:12,textAlign:"center",background:T.subDim}}>
        <div style={{fontSize:10,color:T.textDim,marginBottom:4}}>{r.machine} · {r.date}</div>
        <div style={{fontSize:40,fontWeight:900,color:T.accent}}>{r.score.toFixed(3)}<span style={{fontSize:14,color:T.textDim}}>点</span></div>
      </Card>

      {/* 基本情報 */}
      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>基本情報</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="曲名" val={r.title} k="title"/>
          <Field label="アーティスト" val={r.artist} k="artist"/>
          <Field label="スコア" val={`${r.score.toFixed(3)}点`} k="score" type="number"/>
          <Field label="機種" val={r.machine} k="machine"/>
          <Field label="歌唱日" val={r.date} k="date" type="date"/>
          <Field label="キー変更" val={r.key!=null?`${r.key>=0?"+":""}${r.key}`:""} k="key" type="number"/>
        </div>
      </Card>

      {/* 音域 */}
      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>🎵 音域データ</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="最低音" val={r.lowNote} k="lowNote"/>
          <Field label="最高音" val={r.highNote} k="highNote"/>
          <Field label="音程正確率" val={r.pitchRate!=null?`${r.pitchRate}%`:""} k="pitchRate" type="number"/>
        </div>
        {r.lowNote&&r.highNote&&(()=>{
          const lo=noteToMidi(r.lowNote),hi=noteToMidi(r.highNote);
          if(lo&&hi)return<div style={{fontSize:10,color:T.sub,marginTop:6}}>音域幅: {hi-lo}半音（約{((hi-lo)/12).toFixed(1)}オクターブ）</div>;
        })()}
      </Card>

      {/* 採点詳細 */}
      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>📊 採点詳細</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Field label="ビブラート(秒)" val={r.vibrato!=null?r.vibrato.toFixed(2):""} k="vibrato" type="number"/>
          <Field label="ロングトーン(秒)" val={r.longTone!=null?r.longTone.toFixed(2):""} k="longTone" type="number"/>
          <Field label="抑揚" val={r.expression!=null?`${r.expression}点`:""} k="expression" type="number"/>
          <Field label="安定性" val={r.stability!=null?`${r.stability}点`:""} k="stability" type="number"/>
          <Field label="リズム" val={r.rhythm!=null?`${r.rhythm}点`:""} k="rhythm" type="number"/>
        </div>
        {/* バー表示 */}
        {!editing&&[{label:"音程",val:r.pitchRate},{label:"抑揚",val:r.expression},{label:"安定性",val:r.stability},{label:"リズム",val:r.rhythm}].map((item,i)=>item.val!=null&&(
          <div key={i} style={{marginTop:6}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{fontSize:9,color:T.textDim}}>{item.label}</span>
              <span style={{fontSize:9,color:T.text}}>{item.val}</span>
            </div>
            <div style={{height:4,borderRadius:2,background:T.border}}>
              <div style={{height:"100%",borderRadius:2,background:T.sub,width:`${item.val}%`}}/>
            </div>
          </div>
        ))}
      </Card>

      {/* メモ */}
      <Card T={T} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:6}}>📝 メモ</div>
        {editing
          ?<textarea value={form.memo||""} onChange={e=>upd("memo",e.target.value)} rows={3} style={{...inp,resize:"none"}}/>
          :<div style={{fontSize:12,color:T.text,lineHeight:1.7}}>{r.memo||"メモなし"}</div>
        }
      </Card>

      {editing&&(
        <button onClick={saveEdit} style={{width:"100%",padding:14,background:T.accent,border:"none",borderRadius:12,color:"#FFF",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10}}>保存する</button>
      )}
      <button onClick={del} style={{width:"100%",padding:12,background:"none",border:`1px solid ${T.bad}`,borderRadius:12,color:T.bad,fontWeight:600,fontSize:13,cursor:"pointer"}}>この記録を削除</button>
    </div>
  );
}

// ====== SONGS (曲別) ======
function Songs({data,setPage,setSelSong,T}){
  const [search,setSearch]=useState("");
  const songMap={};
  data.records.forEach(r=>{
    if(!songMap[r.title])songMap[r.title]={title:r.title,artist:r.artist,records:[]};
    songMap[r.title].records.push(r);
  });
  const songs=Object.values(songMap).filter(s=>s.title.includes(search)||s.artist.includes(search))
    .sort((a,b)=>Math.max(...b.records.map(r=>r.score))-Math.max(...a.records.map(r=>r.score)));

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{padding:"18px 0 12px",fontSize:17,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>🎵 曲別記録</div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="曲名・アーティスト検索..."
        style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",color:T.text,fontSize:12,outline:"none",marginBottom:12}}/>

      {songs.map((song,i)=>{
        const best=Math.max(...song.records.map(r=>r.score));
        const avg=song.records.reduce((a,b)=>a+b.score,0)/song.records.length;
        const scores=song.records.sort((a,b)=>a.date.localeCompare(b.date)).map(r=>r.score);
        const hasFav=song.records.some(r=>r.favorite);
        return(
          <Card key={i} T={T} onClick={()=>{setSelSong(song.title);setPage("songdetail");}} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:T.text}}>{song.title} {hasFav&&"★"}</div>
                <div style={{fontSize:10,color:T.textDim}}>{song.artist} · {song.records.length}回歌唱</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:16,fontWeight:900,color:T.accent}}>{best.toFixed(3)}</div>
                <div style={{fontSize:9,color:T.textDim}}>平均 {avg.toFixed(2)}</div>
              </div>
            </div>
            {scores.length>=2&&(
              <div style={{marginTop:8}}>
                <LineChart data={scores} width={280} height={35} T={T}/>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

// ====== SONG DETAIL ======
function SongDetail({data,setData,songTitle,setPage,setSelRecord,T}){
  const records=data.records.filter(r=>r.title===songTitle).sort((a,b)=>b.date.localeCompare(a.date));
  if(!records.length)return<div style={{color:T.textDim,padding:32,textAlign:"center"}}>データなし</div>;
  const best=Math.max(...records.map(r=>r.score));
  const avg=records.reduce((a,b)=>a+b.score,0)/records.length;
  const scores=records.map(r=>r.score).reverse();
  const bestRec=records.find(r=>r.score===best);

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 0 12px"}}>
        <button onClick={()=>setPage("songs")} style={{background:"none",border:"none",color:T.accent,fontSize:20,cursor:"pointer"}}>‹</button>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:T.accent}}>{songTitle}</div>
          <div style={{fontSize:10,color:T.textDim}}>{records[0].artist} · {records.length}回歌唱</div>
        </div>
      </div>

      <Card T={T} style={{marginBottom:12,textAlign:"center"}}>
        <div style={{fontSize:10,color:T.textDim,marginBottom:4}}>自己ベスト</div>
        <div style={{fontSize:36,fontWeight:900,color:T.accent}}>{best.toFixed(3)}</div>
        <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:8,marginBottom:12}}>
          {[{label:"平均",val:avg.toFixed(2)},{label:"歌唱回数",val:`${records.length}回`},{label:"最終",val:records[0].date.slice(5).replace("-","/")}].map((item,i)=>(
            <div key={i}><div style={{fontSize:9,color:T.textDim}}>{item.label}</div><div style={{fontSize:13,fontWeight:700,color:T.text}}>{item.val}</div></div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"center"}}><LineChart data={scores} width={260} height={55} T={T}/></div>
      </Card>

      {/* 音域情報 */}
      {bestRec?.lowNote&&bestRec?.highNote&&(
        <Card T={T} style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>🎵 音域（ベスト時）</div>
          <div style={{display:"flex",gap:16,alignItems:"center"}}>
            <div style={{textAlign:"center",flex:1}}>
              <div style={{fontSize:9,color:T.textDim}}>最低音</div>
              <div style={{fontSize:20,fontWeight:800,color:T.sub}}>{bestRec.lowNote}</div>
            </div>
            <div style={{fontSize:18,color:T.textDim}}>〜</div>
            <div style={{textAlign:"center",flex:1}}>
              <div style={{fontSize:9,color:T.textDim}}>最高音</div>
              <div style={{fontSize:20,fontWeight:800,color:T.accent}}>{bestRec.highNote}</div>
            </div>
            {(()=>{const lo=noteToMidi(bestRec.lowNote),hi=noteToMidi(bestRec.highNote);return lo&&hi&&(
              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:9,color:T.textDim}}>音域幅</div>
                <div style={{fontSize:16,fontWeight:800,color:T.text}}>{hi-lo}<span style={{fontSize:9}}>半音</span></div>
              </div>
            );})()} 
          </div>
        </Card>
      )}

      <div style={{fontSize:10,fontWeight:700,color:T.textDim,letterSpacing:2,marginBottom:8}}>HISTORY</div>
      {records.map((r,i)=>(
        <Card key={i} T={T} onClick={()=>{setSelRecord(r.id);setPage("detail");}} style={{marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:12,color:T.text}}>{r.date} · {r.machine}</div>
              {r.lowNote&&<div style={{fontSize:10,color:T.sub}}>{r.lowNote}〜{r.highNote}{r.pitchRate!=null?` · ${r.pitchRate}%`:""}{r.key?` · キー${r.key>=0?"+":""}${r.key}`:""}</div>}
              {r.memo&&<div style={{fontSize:10,color:T.textDim,fontStyle:"italic"}}>「{r.memo}」</div>}
            </div>
            <div style={{fontSize:16,fontWeight:800,color:r.score===best?T.accent:T.text}}>{r.score.toFixed(3)}{r.score===best&&" 👑"}</div>
          </div>
        </Card>
      ))}
    </div>
  );
}

// ====== ANALYSIS ======
function Analysis({data,setPage,T}){
  const recs=data.records;
  const withRange=recs.filter(r=>r.lowNote&&r.highNote);

  // 音域分析
  const allLows=withRange.map(r=>noteToMidi(r.lowNote)).filter(Boolean);
  const allHighs=withRange.map(r=>noteToMidi(r.highNote)).filter(Boolean);
  const avgLow=allLows.length?Math.round(allLows.reduce((a,b)=>a+b,0)/allLows.length):null;
  const avgHigh=allHighs.length?Math.round(allHighs.reduce((a,b)=>a+b,0)/allHighs.length):null;

  // 曲別ベスト
  const songBests={};
  recs.forEach(r=>{if(!songBests[r.title]||songBests[r.title]<r.score)songBests[r.title]=r.score;});
  const ranking=Object.entries(songBests).sort(([,a],[,b])=>b-a).slice(0,8);

  // おすすめ音域（ユーザーの得意音域に近い曲を提案）
  const SUGGEST=[
    {title:"糸",artist:"中島みゆき",low:"C3",high:"F4",note:"低〜中音域の名曲"},
    {title:"First Love",artist:"宇多田ヒカル",low:"B2",high:"E4",note:"広い音域が必要"},
    {title:"残酷な天使のテーゼ",artist:"高橋洋子",low:"E3",high:"A4",note:"高音が映える"},
    {title:"花",artist:"ORANGE RANGE",low:"G3",high:"G4",note:"音域が狭く歌いやすい"},
    {title:"夜に駆ける",artist:"YOASOBI",low:"D3",high:"B4",note:"広い音域・テンポ速め"},
  ];
  const suggestions=avgLow&&avgHigh?SUGGEST.filter(s=>{
    const sl=noteToMidi(s.low),sh=noteToMidi(s.high);
    return sl&&sh&&sl>=avgLow-5&&sh<=avgHigh+5;
  }):[];

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{padding:"18px 0 14px",fontSize:17,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>📊 分析・音域</div>

      {/* 音域分析 */}
      <Card T={T} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:10}}>🎵 あなたの音域（平均）</div>
        {avgLow&&avgHigh?(
          <>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:10}}>
              <div style={{textAlign:"center",flex:1,background:T.subDim,borderRadius:8,padding:"8px"}}>
                <div style={{fontSize:9,color:T.textDim}}>平均最低音</div>
                <div style={{fontSize:22,fontWeight:900,color:T.sub}}>{midiToNote(avgLow)}</div>
              </div>
              <div style={{fontSize:18,color:T.textDim}}>〜</div>
              <div style={{textAlign:"center",flex:1,background:T.subDim,borderRadius:8,padding:"8px"}}>
                <div style={{fontSize:9,color:T.textDim}}>平均最高音</div>
                <div style={{fontSize:22,fontWeight:900,color:T.accent}}>{midiToNote(avgHigh)}</div>
              </div>
              <div style={{textAlign:"center",flex:1,background:T.subDim,borderRadius:8,padding:"8px"}}>
                <div style={{fontSize:9,color:T.textDim}}>平均音域幅</div>
                <div style={{fontSize:22,fontWeight:900,color:T.text}}>{avgHigh-avgLow}<span style={{fontSize:10}}>半音</span></div>
              </div>
            </div>
            <div style={{fontSize:10,color:T.textDim}}>{withRange.length}曲のデータから算出</div>
          </>
        ):(
          <div style={{color:T.textDim,fontSize:12}}>音域データが不足しています。記録時に最低音・最高音を入力してください。</div>
        )}
      </Card>

      {/* おすすめ曲 */}
      {suggestions.length>0&&(
        <Card T={T} style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>💡 あなたの音域に合う曲</div>
          {suggestions.map((s,i)=>(
            <div key={i} style={{padding:"7px 0",borderBottom:i<suggestions.length-1?`1px solid ${T.border}`:"none"}}>
              <div style={{fontSize:12,fontWeight:600,color:T.text}}>{s.title}</div>
              <div style={{fontSize:10,color:T.textDim}}>{s.artist} · {s.low}〜{s.high}</div>
              <div style={{fontSize:9,color:T.sub}}>{s.note}</div>
            </div>
          ))}
        </Card>
      )}

      {/* スコアランキング */}
      <Card T={T} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:10}}>🏆 曲別ベストランキング</div>
        {ranking.map(([title,score],i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:i<ranking.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{width:20,textAlign:"center",fontSize:12,fontWeight:700,color:i<3?T.accent:T.textDim}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:T.text}}>{title}</div>
              <div style={{height:3,borderRadius:2,background:T.border,marginTop:3}}>
                <div style={{height:"100%",borderRadius:2,background:i===0?T.accent:T.sub,width:`${((score-85)/15)*100}%`}}/>
              </div>
            </div>
            <div style={{fontSize:13,fontWeight:800,color:i===0?T.accent:T.text}}>{score.toFixed(3)}</div>
          </div>
        ))}
      </Card>

      {/* 総合統計 */}
      <Card T={T}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:10}}>📈 総合統計</div>
        {[
          {label:"総記録数",val:`${recs.length}件`},
          {label:"自己ベスト",val:recs.length?`${Math.max(...recs.map(r=>r.score)).toFixed(3)}点`:"—"},
          {label:"総合平均",val:recs.length?`${(recs.reduce((a,b)=>a+b.score,0)/recs.length).toFixed(2)}点`:"—"},
          {label:"歌唱曲数",val:`${new Set(recs.map(r=>r.title)).size}曲`},
          {label:"使用機種",val:[...new Set(recs.map(r=>r.machine))].join("・")||"—"},
        ].map((item,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<4?`1px solid ${T.border}`:"none"}}>
            <span style={{fontSize:11,color:T.textDim}}>{item.label}</span>
            <span style={{fontSize:11,fontWeight:700,color:T.text}}>{item.val}</span>
          </div>
        ))}
      </Card>
    </div>
  );
}

// ====== MYPAGE / SETTINGS ======
function MyPage({data,setData,setPage,currentThemeId,setTheme,T}){
  const [pasteText,setPasteText]=useState("");
  const [msg,setMsg]=useState("");

  const importData=()=>{
    const parsed=parseKaraScore(pasteText);
    if(!parsed.length){setMsg("⚠️ 読み込めるデータがありませんでした");setTimeout(()=>setMsg(""),3000);return;}
    const nd={...data,records:[...parsed,...data.records]};
    setData(nd);save(nd);setPasteText("");
    setMsg(`✅ ${parsed.length}件インポートしました`);
    setTimeout(()=>setMsg(""),3000);
  };

  const exportData=()=>{
    const txt=data.records.map(r=>`KARASCORE|${r.title}|${r.artist}|${r.score}|${r.machine}|${r.date}|${r.lowNote||""}|${r.highNote||""}|${r.pitchRate!=null?r.pitchRate:""}|${r.vibrato!=null?r.vibrato:""}|${r.longTone!=null?r.longTone:""}|${r.expression!=null?r.expression:""}|${r.stability!=null?r.stability:""}|${r.rhythm!=null?r.rhythm:""}|${r.key||0}|${r.memo||""}`).join("\n");
    navigator.clipboard.writeText(txt).then(()=>{setMsg("✅ クリップボードにコピーしました");setTimeout(()=>setMsg(""),3000);});
  };

  const clearAll=()=>{
    if(!confirm("全データを削除しますか？この操作は取り消せません"))return;
    const nd={...data,records:[]};setData(nd);save(nd);
    setMsg("🗑️ データを削除しました");setTimeout(()=>setMsg(""),3000);
  };

  const inp={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:T.text,fontSize:12,outline:"none"};

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{padding:"18px 0 14px",fontSize:17,fontWeight:800,color:T.accent,fontFamily:"Georgia,serif"}}>⚙️ 設定・データ</div>

      {/* テーマ */}
      <Card T={T} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:10}}>🎨 テーマ</div>
        {Object.values(THEMES).map(theme=>(
          <button key={theme.id} onClick={()=>setTheme(theme.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"10px 12px",background:currentThemeId===theme.id?T.subDim:"none",border:`1.5px solid ${currentThemeId===theme.id?T.sub:T.border}`,borderRadius:10,cursor:"pointer",marginBottom:6,textAlign:"left"}}>
            <span style={{fontSize:18}}>{theme.label.split(" ")[0]}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:T.text}}>{theme.label.split(" ").slice(1).join(" ")}</div>
              <div style={{fontSize:10,color:T.textDim}}>{theme.desc||""}</div>
            </div>
            {currentThemeId===theme.id&&<span style={{color:T.accent}}>✓</span>}
          </button>
        ))}
      </Card>

      {/* インポート */}
      <Card T={T} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:6}}>📥 データインポート</div>
        <div style={{fontSize:10,color:T.textDim,marginBottom:8,lineHeight:1.6}}>
          KARASCORE形式またはパイプ区切りで貼り付け{"\n"}
          <span style={{color:T.accent,fontSize:9}}>KARASCORE|曲名|アーティスト|点数|機種|日付|最低音|最高音|音程%|ビブラート|ロングトーン|抑揚|安定性|リズム|キー|メモ</span>
        </div>
        <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={4}
          placeholder={"KARASCORE|残酷な天使のテーゼ|高橋洋子|93.67|JOYSOUND|2026-06-12|E3|A4|89|14.887|14.887|67|80|75|0|最高！"}
          style={{...inp,resize:"none",marginBottom:8}}/>
        <button onClick={importData} style={{width:"100%",padding:"9px",background:T.sub,border:"none",borderRadius:8,color:"#FFF",fontWeight:700,fontSize:12,cursor:"pointer"}}>インポートする</button>
        {msg&&<div style={{marginTop:6,fontSize:11,color:T.accent,fontWeight:600,textAlign:"center"}}>{msg}</div>}
      </Card>

      {/* エクスポート */}
      <Card T={T} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:6}}>📤 データエクスポート</div>
        <div style={{fontSize:10,color:T.textDim,marginBottom:8}}>全記録をKARASCORE形式でクリップボードにコピーします</div>
        <button onClick={exportData} style={{width:"100%",padding:"9px",background:T.accent,border:"none",borderRadius:8,color:"#FFF",fontWeight:700,fontSize:12,cursor:"pointer"}}>エクスポート（コピー）</button>
      </Card>

      {/* 危険ゾーン */}
      <Card T={T}>
        <div style={{fontSize:11,fontWeight:700,color:T.bad,marginBottom:6}}>⚠️ データ削除</div>
        <div style={{fontSize:10,color:T.textDim,marginBottom:8}}>全記録を削除します。この操作は取り消せません。</div>
        <button onClick={clearAll} style={{width:"100%",padding:"9px",background:"none",border:`1px solid ${T.bad}`,borderRadius:8,color:T.bad,fontWeight:700,fontSize:12,cursor:"pointer"}}>全データを削除</button>
      </Card>
    </div>
  );
}

// ====== RECORD ======
function Record({data,setData,setPage,T}){
  const today=new Date().toISOString().slice(0,10);
  const [form,setForm]=useState({title:"",artist:"",score:"",machine:"JOYSOUND",date:today,lowNote:"",highNote:"",pitchRate:"",vibrato:"",longTone:"",expression:"",stability:"",rhythm:"",key:"0",memo:""});
  const [pasteText,setPasteText]=useState("");
  const [pasteMsg,setPasteMsg]=useState("");

  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));

  const save_=()=>{
    if(!form.title||!form.score)return;
    const nr={id:`r${Date.now()}`,title:form.title,artist:form.artist,score:parseFloat(form.score),
      machine:form.machine,date:form.date,lowNote:form.lowNote,highNote:form.highNote,
      pitchRate:form.pitchRate?parseInt(form.pitchRate):null,vibrato:form.vibrato?parseFloat(form.vibrato):null,
      longTone:form.longTone?parseFloat(form.longTone):null,expression:form.expression?parseInt(form.expression):null,
      stability:form.stability?parseInt(form.stability):null,rhythm:form.rhythm?parseInt(form.rhythm):null,
      key:parseInt(form.key)||0,memo:form.memo,favorite:false};
    const nd={...data,records:[nr,...data.records]};
    setData(nd);save(nd);setPage("home");
  };

  const parsePaste=()=>{
    const parsed=parseKaraScore(pasteText);
    if(!parsed.length){setPasteMsg("⚠️ 形式が違います");setTimeout(()=>setPasteMsg(""),3000);return;}
    const nd={...data,records:[...parsed,...data.records]};
    setData(nd);save(nd);
    setPasteMsg(`✅ ${parsed.length}件を記録しました！`);
    setPasteText("");
    setTimeout(()=>{setPasteMsg("");setPage("home");},1500);
  };

  const inp={width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 10px",color:T.text,fontSize:12,outline:"none"};
  const Label=({children})=><div style={{fontSize:9,color:T.textDim,marginBottom:3}}>{children}</div>;

  return(
    <div className="page-enter" style={{padding:"0 16px 100px 30px",overflowY:"auto",height:"100%",position:"relative"}}>
      <Rings T={T}/>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"18px 0 14px"}}>
        <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:T.accent,fontSize:20,cursor:"pointer"}}>‹</button>
        <div style={{fontSize:15,fontWeight:700,color:T.accent}}>📝 新しい歌唱の記録</div>
      </div>

      {/* コピペ入力 */}
      <Card T={T} style={{marginBottom:12,border:`1px solid ${T.sub}50`}}>
        <div style={{fontSize:11,fontWeight:700,color:T.sub,marginBottom:4}}>📋 Claudeからコピペで一括入力</div>
        <div style={{fontSize:10,color:T.textDim,marginBottom:6,lineHeight:1.6}}>
          採点画面の写真をClaudeに送って「KaraLog用KARASCORE形式で」と頼むとデータを返してくれます
        </div>
        <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={3}
          placeholder={"KARASCORE|残酷な天使のテーゼ|高橋洋子|93.67|JOYSOUND|2026-06-12|E3|A4|89|14.887|14.887|67|80|75|0|最高！\n曲名|アーティスト|点数|機種 でも可"}
          style={{...inp,resize:"none",fontSize:10,marginBottom:6}}/>
        <button onClick={parsePaste} style={{width:"100%",padding:"8px",background:T.sub,border:"none",borderRadius:8,color:"#FFF",fontWeight:700,fontSize:12,cursor:"pointer"}}>読み込む</button>
        {pasteMsg&&<div style={{marginTop:6,fontSize:11,color:T.accent,fontWeight:600,textAlign:"center"}}>{pasteMsg}</div>}
      </Card>

      {/* 手動入力 */}
      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>✏️ 手動入力</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><Label>曲名 *</Label><input value={form.title} onChange={e=>upd("title",e.target.value)} placeholder="残酷な天使のテーゼ" style={inp}/></div>
          <div><Label>アーティスト</Label><input value={form.artist} onChange={e=>upd("artist",e.target.value)} placeholder="高橋洋子" style={inp}/></div>
          <div><Label>スコア *</Label><input type="number" value={form.score} onChange={e=>upd("score",e.target.value)} placeholder="93.670" style={inp}/></div>
          <div><Label>機種</Label>
            <select value={form.machine} onChange={e=>upd("machine",e.target.value)} style={{...inp}}>
              <option>JOYSOUND</option><option>DAM</option><option>JOYSOUND MAX GO</option><option>LIVE DAM</option>
            </select>
          </div>
          <div><Label>歌唱日</Label><input type="date" value={form.date} onChange={e=>upd("date",e.target.value)} style={inp}/></div>
          <div><Label>キー変更</Label><input type="number" value={form.key} onChange={e=>upd("key",e.target.value)} placeholder="0" style={inp}/></div>
        </div>
      </Card>

      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>🎵 音域データ</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div><Label>最低音</Label><input value={form.lowNote} onChange={e=>upd("lowNote",e.target.value)} placeholder="E3" style={inp}/></div>
          <div><Label>最高音</Label><input value={form.highNote} onChange={e=>upd("highNote",e.target.value)} placeholder="A4" style={inp}/></div>
          <div><Label>音程正確率%</Label><input type="number" value={form.pitchRate} onChange={e=>upd("pitchRate",e.target.value)} placeholder="89" style={inp}/></div>
        </div>
      </Card>

      <Card T={T} style={{marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:8}}>📊 採点詳細</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><Label>ビブラート(秒)</Label><input type="number" value={form.vibrato} onChange={e=>upd("vibrato",e.target.value)} placeholder="14.887" style={inp}/></div>
          <div><Label>ロングトーン(秒)</Label><input type="number" value={form.longTone} onChange={e=>upd("longTone",e.target.value)} placeholder="14.887" style={inp}/></div>
          <div><Label>抑揚</Label><input type="number" value={form.expression} onChange={e=>upd("expression",e.target.value)} placeholder="67" style={inp}/></div>
          <div><Label>安定性</Label><input type="number" value={form.stability} onChange={e=>upd("stability",e.target.value)} placeholder="80" style={inp}/></div>
          <div><Label>リズム</Label><input type="number" value={form.rhythm} onChange={e=>upd("rhythm",e.target.value)} placeholder="75" style={inp}/></div>
        </div>
      </Card>

      <Card T={T} style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:T.accent,marginBottom:6}}>📝 メモ</div>
        <textarea value={form.memo} onChange={e=>upd("memo",e.target.value)} rows={2} placeholder="今日の感想..." style={{...inp,resize:"none"}}/>
      </Card>

      <button onClick={save_} style={{width:"100%",padding:14,background:T.accent,border:"none",borderRadius:12,color:"#FFF",fontWeight:700,fontSize:15,cursor:"pointer"}}>記録を保存 ✍️</button>
    </div>
  );
}

// ====== APP ======
function App(){
  const [data,setData]=useState(()=>load());
  const [page,setPage]=useState("home");
  const [selRecord,setSelRecord]=useState(null);
  const [selSong,setSelSong]=useState(null);
  const [themeId,setThemeId]=useState(()=>localStorage.getItem(TK)||"note");
  const setTheme=useCallback(id=>{setThemeId(id);localStorage.setItem(TK,id);},[]);
  const T=THEMES[themeId]||THEMES.note;

  return(
    <div style={{maxWidth:430,margin:"0 auto",height:"100vh",display:"flex",flexDirection:"column",background:T.bg,color:T.text,position:"relative",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto"}}>
        {page==="home"&&<Home data={data} setPage={setPage} setSelRecord={setSelRecord} T={T}/>}
        {page==="history"&&<History data={data} setData={setData} setPage={setPage} setSelRecord={setSelRecord} T={T}/>}
        {page==="detail"&&<Detail data={data} setData={setData} recordId={selRecord} setPage={setPage} T={T}/>}
        {page==="songs"&&<Songs data={data} setPage={setPage} setSelSong={setSelSong} T={T}/>}
        {page==="songdetail"&&<SongDetail data={data} setData={setData} songTitle={selSong} setPage={setPage} setSelRecord={setSelRecord} T={T}/>}
        {page==="analysis"&&<Analysis data={data} setPage={setPage} T={T}/>}
        {page==="mypage"&&<MyPage data={data} setData={setData} setPage={setPage} currentThemeId={themeId} setTheme={setTheme} T={T}/>}
        {page==="record"&&<Record data={data} setData={setData} setPage={setPage} T={T}/>}
      </div>
      {page!=="record"&&<Nav page={page} setPage={setPage} T={T}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
